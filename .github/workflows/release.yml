name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted, macos-26]
    env:
      SCHEME: orbit
      CONFIGURATION: Release
      TAP_REPO: zekevh/homebrew-tap
      CASK_NAME: orbit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          xcodebuild build \
            -project Orbit.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$RUNNER_TEMP/build" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$(git rev-list --count HEAD)" \
            ENABLE_APP_SANDBOX=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Verify app artifact
        run: |
          test -d "$RUNNER_TEMP/build/Build/Products/Release/Orbit.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Orbit" \
            -srcfolder "$RUNNER_TEMP/build/Build/Products/Release/Orbit.app" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/Orbit-${VERSION}.dmg"
          echo "DMG_PATH=$RUNNER_TEMP/Orbit-${VERSION}.dmg" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          echo "SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/${TAP_REPO}.git" "$RUNNER_TEMP/homebrew-tap"
          CASK="$RUNNER_TEMP/homebrew-tap/Casks/${CASK_NAME}.rb"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$CASK"
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK"
          cd "$RUNNER_TEMP/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Casks/${CASK_NAME}.rb"
          git commit -m "chore(${CASK_NAME}): bump version to ${VERSION}"
          git push
